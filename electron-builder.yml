appId: com.zazaman.zazarequester
productName: ZazaRequester
icon: resources/icon.png

directories:
  output: release
  buildResources: build

# What gets bundled into the app. electron-vite outputs to out/.
files:
  - out/**/*
  - package.json
  - resources/**/*

# Bundle the system curl assumption note: the app shells out to the system
# `curl` binary at runtime, so it is not packaged here.

linux:
  # Point at the generated icon ladder (16..512) so every desktop environment
  # finds a standard hicolor size. A single non-standard size (e.g. 500x500)
  # gets skipped by some launchers.
  icon: build/icons
  target:
    - AppImage
    - deb
  category: Development
  maintainer: ZazaMan

# No native modules, skip the rebuild step.
npmRebuild: false
